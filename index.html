<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactile Counter Button</title>
    <style>
        /* Setup the white canvas and align items to the left */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-start; /* Keeps the button on the left */
            background-color: #ffffff;
            padding-left: 10vw; /* Gives it a little breathing room from the edge */
            font-family: 'Impact', 'Arial Black', sans-serif; /* Blocky font */
            user-select: none; /* Prevents text highlighting when clicking fast */
        }

        /* Tactile Grey Button Styling */
        #tactile-btn {
            background: linear-gradient(145deg, #f3f3f3, #cccccc);
            border: none;
            padding: 20px 45px;
            font-size: 4rem;
            color: #4a4a4a;
            border-radius: 12px;
            /* Creates the 3D raised effect */
            box-shadow: 
                0 10px 0 #9e9e9e, 
                5px 15px 15px rgba(0,0,0,0.15); 
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 20px;
            outline: none;
            font-family: inherit;
            /* Smooth transition for the physical press */
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* The "Pressed" State */
        #tactile-btn:active {
            /* Pushes the button down to the floor */
            transform: translateY(10px);
            /* Flattens the 3D shadow */
            box-shadow: 
                0 0 0 #9e9e9e, 
                2px 2px 5px rgba(0,0,0,0.1);
        }

        /* Counter container and animation */
        #counter {
            display: inline-block;
            min-width: 60px;
            text-align: left;
        }

        .rise-anim {
            animation: riseUp 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes riseUp {
            0% { 
                transform: translateY(15px); 
                opacity: 0; 
            }
            100% { 
                transform: translateY(0); 
                opacity: 1; 
            }
        }
    </style>
</head>
<body>

    <button id="tactile-btn">
        <span>EX:</span>
        <span id="counter">0</span>
    </button>

    <script>
        const btn = document.getElementById('tactile-btn');
        const counter = document.getElementById('counter');
        let count = 0;

        btn.addEventListener('click', () => {
            // Increment the counter
            count++;
            counter.textContent = count;

            // Remove and re-add the animation class to trigger the "rise" effect every click
            counter.classList.remove('rise-anim');
            
            // Trigger a reflow in between removing and adding the class
            // This forces the browser to restart the animation
            void counter.offsetWidth; 
            
            counter.classList.add('rise-anim');
        });
    </script>
</body>
</html>
