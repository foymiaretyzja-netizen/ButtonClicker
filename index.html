<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactile Button & Shake Counter</title>
    <style>
        /* Base Setup */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            font-family: 'Impact', 'Arial Black', sans-serif;
            user-select: none;
        }

        /* Top Bar Styling */
        #top-bar {
            width: 100%;
            height: 70px;
            background-color: #f8f8f8;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* Counter Wrapper - Removed strict height and overflow to prevent ANY clipping */
        #counter-wrapper {
            display: flex;
            align-items: center; 
        }

        /* Counter styling */
        #counter {
            display: block;
            font-size: 4rem;
            color: #4a4a4a;
            text-shadow: 2px 3px 4px rgba(0, 0, 0, 0.3);
            /* Set a neutral starting position for the shake */
            transform: translate(0, 0) rotate(0deg);
        }

        /* Main Canvas Area */
        #canvas {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 10vw;
        }

        /* Center Divider */
        #canvas::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background-color: #f0f0f0;
            border-radius: 2px;
        }

        /* Tactile Grey Button Styling */
        #tactile-btn {
            background: linear-gradient(145deg, #f3f3f3, #cccccc);
            border: none;
            padding: 20px 45px;
            font-size: 3.5rem;
            color: #4a4a4a;
            border-radius: 12px;
            box-shadow: 
                0 10px 0 #9e9e9e, 
                5px 15px 15px rgba(0,0,0,0.15); 
            cursor: pointer;
            outline: none;
            font-family: inherit;
            transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
            z-index: 5; 
        }

        /* The "Pressed" State */
        #tactile-btn:active {
            transform: translateY(10px);
            box-shadow: 
                0 0 0 #9e9e9e, 
                2px 2px 5px rgba(0,0,0,0.1);
        }

        /* Shake Animation - A fast, mechanical jolt */
        .shake-anim {
            animation: mechanicalShake 0.2s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        @keyframes mechanicalShake {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-3px, 2px) rotate(-2deg); }
            50% { transform: translate(3px, -2px) rotate(2deg); }
            75% { transform: translate(-3px, -2px) rotate(-1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <div id="counter-wrapper">
            <span id="counter">0</span>
        </div>
    </div>

    <div id="canvas">
        <button id="tactile-btn">PRESS ME</button>
    </div>

    <script>
        const btn = document.getElementById('tactile-btn');
        const counter = document.getElementById('counter');
        let count = 0;

        btn.addEventListener('click', () => {
            count++;
            counter.textContent = count;

            // Swapped the class to trigger the new shake animation
            counter.classList.remove('shake-anim');
            
            // Trigger a reflow to restart the animation smoothly
            void counter.offsetWidth; 
            
            counter.classList.add('shake-anim');
        });
    </script>
</body>
</html>
