<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactile Button & Top Bar Counter</title>
    <style>
        /* Base Setup */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column; /* Stacks the top bar and the main canvas */
            background-color: #ffffff;
            font-family: 'Impact', 'Arial Black', sans-serif;
            user-select: none;
        }

        /* Top Bar Styling */
        #top-bar {
            width: 100%;
            height: 100px;
            background-color: #f8f8f8;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center; /* Centers the counter in the bar */
        }

        /* Counter Wrapper (clips the number so it rises cleanly from the bottom line) */
        #counter-wrapper {
            overflow: hidden;
            padding: 10px;
        }

        /* Counter styling with depth */
        #counter {
            display: inline-block;
            font-size: 4.5rem;
            color: #4a4a4a;
            text-shadow: 2px 3px 4px rgba(0, 0, 0, 0.3);
        }

        /* Main Canvas Area */
        #canvas {
            flex-grow: 1; /* Takes up the rest of the screen */
            display: flex;
            align-items: center;
            justify-content: flex-start; /* Keeps button on the left */
            padding-left: 10vw;
        }

        /* Tactile Grey Button Styling */
        #tactile-btn {
            background: linear-gradient(145deg, #f3f3f3, #cccccc);
            border: none;
            padding: 20px 45px;
            font-size: 3.5rem;
            color: #4a4a4a;
            border-radius: 12px;
            box-shadow: 
                0 10px 0 #9e9e9e, 
                5px 15px 15px rgba(0,0,0,0.15); 
            cursor: pointer;
            outline: none;
            font-family: inherit;
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* The "Pressed" State */
        #tactile-btn:active {
            transform: translateY(10px);
            box-shadow: 
                0 0 0 #9e9e9e, 
                2px 2px 5px rgba(0,0,0,0.1);
        }

        /* Animation class for the rising effect */
        .rise-anim {
            animation: riseUp 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes riseUp {
            0% { 
                transform: translateY(60px); 
                opacity: 0; 
            }
            100% { 
                transform: translateY(0); 
                opacity: 1; 
            }
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <div id="counter-wrapper">
            <span id="counter">0</span>
        </div>
    </div>

    <div id="canvas">
        <button id="tactile-btn">PRESS ME</button>
    </div>

    <script>
        const btn = document.getElementById('tactile-btn');
        const counter = document.getElementById('counter');
        let count = 0;

        btn.addEventListener('click', () => {
            count++;
            counter.textContent = count;

            counter.classList.remove('rise-anim');
            
            // Trigger a reflow to restart the animation smoothly
            void counter.offsetWidth; 
            
            counter.classList.add('rise-anim');
        });
    </script>
</body>
</html>
