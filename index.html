<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactile Clicker Game</title>
    <style>
        /* Base Setup */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            font-family: 'Impact', 'Arial Black', sans-serif;
            user-select: none;
            color: #4a4a4a;
            overflow: hidden;
        }

        /* Top Bar Styling */
        #top-bar {
            width: 100%;
            height: 70px;
            background-color: #f8f8f8;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            z-index: 20;
        }

        #cps-display {
            font-size: 1.5rem;
            width: 150px;
            text-align: left;
        }

        #counter-wrapper {
            display: flex;
            align-items: center; 
        }

        #counter {
            display: block;
            font-size: 4rem;
            text-shadow: 2px 3px 4px rgba(0, 0, 0, 0.3);
            transition: color 0.3s;
        }

        .spacer {
            width: 150px;
        }

        /* Main Canvas Area */
        #canvas {
            position: relative;
            flex-grow: 1;
            display: flex;
        }

        /* Center Divider */
        #canvas::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background-color: #f0f0f0;
            border-radius: 2px;
        }

        /* Left Zone (Main Button) */
        #left-zone {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Stats Display for Items Owned */
        #inventory-display {
            position: absolute;
            top: 20px;
            left: 30px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 1.2rem;
            color: #888;
        }

        /* Right Zone (Upgrades) */
        #right-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
            background-color: #fafafa;
            overflow-y: auto;
        }

        h2 {
            margin-top: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-shadow: 1px 2px 2px rgba(0,0,0,0.1);
        }

        /* Tactile Button Base Class */
        .tactile-btn {
            background: linear-gradient(145deg, #f3f3f3, #cccccc);
            border: none;
            color: #4a4a4a;
            border-radius: 12px;
            box-shadow: 0 10px 0 #9e9e9e, 5px 15px 15px rgba(0,0,0,0.15); 
            cursor: pointer;
            outline: none;
            font-family: inherit;
            transition: transform 0.06s ease-out, box-shadow 0.06s ease-out, background 0.3s, color 0.3s;
            z-index: 5; 
        }

        .tactile-btn:active:not(:disabled) {
            transform: translateY(10px);
            box-shadow: 0 0 0 #9e9e9e, 2px 2px 5px rgba(0,0,0,0.1);
        }
        
        .tactile-btn:focus-visible {
            outline: 3px solid #9e9e9e;
            outline-offset: 5px;
        }

        .tactile-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(10px);
            box-shadow: 0 0 0 #9e9e9e, 2px 2px 5px rgba(0,0,0,0.1);
        }

        /* THE RED BUTTON UPGRADE STATE */
        .tactile-btn.red-shiny {
            background: linear-gradient(145deg, #ff4d4d, #cc0000);
            color: #ffffff;
            box-shadow: 0 10px 0 #990000, 5px 15px 15px rgba(204,0,0,0.25);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .tactile-btn.red-shiny:active:not(:disabled) {
            box-shadow: 0 0 0 #990000, 2px 2px 5px rgba(204,0,0,0.25);
        }

        /* Specific Button Sizes */
        .main-btn {
            padding: 20px 45px;
            font-size: 3.5rem;
        }

        .upgrade-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            width: 80%;
            max-width: 400px;
        }

        .store-btn {
            flex-grow: 1;
            padding: 15px;
            font-size: 1.2rem;
            line-height: 1.4;
        }

        .icon-btn {
            padding: 0 20px;
            font-size: 1.8rem;
        }

        /* Settings Panel */
        #settings-panel {
            width: 80%;
            max-width: 400px;
            background: #eaeaea;
            padding: 20px;
            border-radius: 12px;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 15px;
        }

        .hidden {
            display: none !important;
        }

        .speed-btn {
            padding: 10px;
            font-size: 1.1rem;
        }

        /* Toast Notification System */
        #toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
            pointer-events: none;
        }

        .toast {
            background-color: #333;
            color: #fff;
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .toast.bad { background-color: #d32f2f; }
        .toast.good { background-color: #388e3c; }

    </style>
</head>
<body>

    <div id="top-bar">
        <div id="cps-display">CPS: 0</div>
        <div id="counter-wrapper">
            <span id="counter">0</span>
        </div>
        <div class="spacer"></div>
    </div>

    <div id="canvas">
        
        <div id="left-zone">
            <div id="inventory-display">
                <div id="clickers-owned-display">Auto Clickers: 0</div>
                <div id="factories-owned-display">Click Factories: 0</div>
                <div id="parks-owned-display">Amusement Parks: 0</div>
                <div id="multiplier-display">Multiplier: x1</div>
            </div>
            <button class="tactile-btn main-btn" id="main-btn">PRESS ME</button>
        </div>

        <div id="right-zone">
            <h2>UPGRADES</h2>
            
            <div class="upgrade-row">
                <button class="tactile-btn store-btn" id="buy-clicker-btn">
                    +1 Auto Clicker<br>Cost: <span id="clicker-cost">100</span>
                </button>
                <button class="tactile-btn icon-btn" id="settings-btn">⚙</button>
            </div>

            <div id="settings-panel" class="hidden">
                <h3 style="margin: 0 0 10px 0; font-size: 1.2rem; text-align: center;">UPGRADE CLICKER SPEED</h3>
                <button class="tactile-btn speed-btn" id="upg-5cps" data-cost="500" data-val="5">5 CPS (Cost: 500)</button>
                <button class="tactile-btn speed-btn" id="upg-10cps" data-cost="2000" data-val="10">10 CPS (Cost: 2,000)</button>
                <button class="tactile-btn speed-btn" id="upg-100cps" data-cost="10000" data-val="100">100 CPS (Cost: 10,000)</button>
            </div>

            <div class="upgrade-row">
                <button class="tactile-btn store-btn" id="buy-red-btn" style="width: 100%;">
                    Red Button Upgrade (Global x2)<br>Cost: 5,000
                </button>
            </div>

            <div class="upgrade-row">
                <button class="tactile-btn store-btn" id="buy-factory-btn" style="width: 100%;">
                    +1 Click Factory (1k Clicks / 5s)<br>Cost: <span id="factory-cost">10,000</span>
                </button>
            </div>
            
            <div class="upgrade-row">
                <button class="tactile-btn store-btn" id="buy-factory-boost-btn" style="width: 100%;">
                    Overclocked Gears ⚙️ (Factory x2)<br>Cost: 15,000
                </button>
            </div>

            <div class="upgrade-row">
                <button class="tactile-btn store-btn" id="buy-park-btn" style="width: 100%;">
                    +1 Button Amusement Park (+25k CPS)<br>Cost: <span id="park-cost">100,000</span>
                </button>
            </div>

        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        // Game Variables
        let clicks = 0;
        
        let autoClickers = 0;
        let clickerCost = 100;
        let clickerPower = 1; 

        let globalMultiplier = 1; 
        const redButtonCost = 5000;

        let factories = 0;
        let factoryCost = 10000;
        let factoryMultiplier = 1; // Used for the new Overclocked Gears upgrade
        const factoryBoostCost = 15000;

        let parks = 0;
        let parkCost = 100000;

        // DOM Elements
        const mainBtn = document.getElementById('main-btn');
        const counter = document.getElementById('counter');
        const cpsDisplay = document.getElementById('cps-display');
        const toastContainer = document.getElementById('toast-container');
        
        const clickersOwnedDisplay = document.getElementById('clickers-owned-display');
        const clickerCostDisplay = document.getElementById('clicker-cost');
        
        const factoriesOwnedDisplay = document.getElementById('factories-owned-display');
        const buyFactoryBtn = document.getElementById('buy-factory-btn');
        const factoryCostDisplay = document.getElementById('factory-cost');

        const buyFactoryBoostBtn = document.getElementById('buy-factory-boost-btn');

        const parksOwnedDisplay = document.getElementById('parks-owned-display');
        const buyParkBtn = document.getElementById('buy-park-btn');
        const parkCostDisplay = document.getElementById('park-cost');

        const multiplierDisplay = document.getElementById('multiplier-display');
        const buyRedBtn = document.getElementById('buy-red-btn');

        const buyClickerBtn = document.getElementById('buy-clicker-btn');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsPanel = document.getElementById('settings-panel');

        // Format numbers with commas
        function formatNum(num) {
            return num.toLocaleString();
        }

        // Master UI Updater
        function updateUI() {
            counter.textContent = formatNum(Math.floor(clicks));
            
            // Calculate total CPS 
            // Factory adds (1000 * multiplier) every 5s, meaning (200 * multiplier) CPS.
            const clickerCPS = (autoClickers * clickerPower * globalMultiplier);
            const factoryCPS = (factories * 200 * factoryMultiplier);
            const parkCPS = (parks * 25000); // 25k clicks per second
            
            const totalCPS = clickerCPS + factoryCPS + parkCPS;
            cpsDisplay.textContent = `CPS: ${formatNum(totalCPS)}`;
            
            clickersOwnedDisplay.textContent = `Auto Clickers: ${formatNum(autoClickers)}`;
            clickerCostDisplay.textContent = formatNum(clickerCost);
            
            factoriesOwnedDisplay.textContent = `Click Factories: ${formatNum(factories)}`;
            factoryCostDisplay.textContent = formatNum(factoryCost);

            parksOwnedDisplay.textContent = `Amusement Parks: ${formatNum(parks)}`;
            parkCostDisplay.textContent = formatNum(parkCost);

            multiplierDisplay.textContent = `Multiplier: x${globalMultiplier}`;
        }

        // Show Toast Notification
        function showToast(message, type = "neutral") {
            const toast = document.createElement('div');
            toast.classList.add('toast', type);
            toast.textContent = message;
            
            toastContainer.appendChild(toast);
            
            // Trigger animation
            setTimeout(() => toast.classList.add('show'), 10);
            
            // Remove after 3.5 seconds
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // Flash counter color for events
        function flashCounter(color) {
            counter.style.color = color;
            setTimeout(() => counter.style.color = '#4a4a4a', 1000);
        }

        // 1. Main Button Click
        mainBtn.addEventListener('click', () => {
            clicks += (1 * globalMultiplier);
            updateUI();
        });

        // 2. Buy Auto Clicker
        buyClickerBtn.addEventListener('click', () => {
            if (clicks >= clickerCost) {
                clicks -= clickerCost;
                autoClickers++;
                clickerCost = Math.ceil(clickerCost * 1.15); 
                updateUI();
            }
        });

        // 3. Buy Click Factory
        buyFactoryBtn.addEventListener('click', () => {
            if (clicks >= factoryCost) {
                clicks -= factoryCost;
                factories++;
                factoryCost = Math.ceil(factoryCost * 1.15); 
                updateUI();
            }
        });

        // 4. Buy Factory Boost (Overclocked Gears)
        buyFactoryBoostBtn.addEventListener('click', () => {
            if (clicks >= factoryBoostCost && factoryMultiplier === 1) {
                clicks -= factoryBoostCost;
                factoryMultiplier = 2; // Doubles factory output permanently
                
                buyFactoryBoostBtn.disabled = true;
                buyFactoryBoostBtn.innerHTML = "GEARS OVERCLOCKED ⚙️";
                
                updateUI();
            }
        });

        // 5. Buy Amusement Park
        buyParkBtn.addEventListener('click', () => {
            if (clicks >= parkCost) {
                clicks -= parkCost;
                parks++;
                parkCost = Math.ceil(parkCost * 1.15); 
                updateUI();
            }
        });

        // 6. Buy Red Button Upgrade
        buyRedBtn.addEventListener('click', () => {
            if (clicks >= redButtonCost && globalMultiplier === 1) {
                clicks -= redButtonCost;
                globalMultiplier = 2; 
                
                mainBtn.classList.add('red-shiny');
                
                buyRedBtn.disabled = true;
                buyRedBtn.innerHTML = "RED BUTTON INSTALLED";
                
                updateUI();
            }
        });

        // 7. Toggle Settings Panel
        settingsBtn.addEventListener('click', () => {
            settingsPanel.classList.toggle('hidden');
        });

        // 8. Handle Speed Upgrades
        const speedButtons = [
            document.getElementById('upg-5cps'),
            document.getElementById('upg-10cps'),
            document.getElementById('upg-100cps')
        ];

        speedButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                const cost = parseInt(this.getAttribute('data
