<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactile Clicker Game</title>
    <style>
        /* Base Setup */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            font-family: 'Impact', 'Arial Black', sans-serif;
            user-select: none;
            color: #4a4a4a;
        }

        /* Top Bar Styling */
        #top-bar {
            width: 100%;
            height: 70px;
            background-color: #f8f8f8;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            z-index: 20;
        }

        #cps-display {
            font-size: 1.5rem;
            width: 150px;
            text-align: left;
        }

        #counter-wrapper {
            display: flex;
            align-items: center; 
        }

        #counter {
            display: block;
            font-size: 4rem;
            text-shadow: 2px 3px 4px rgba(0, 0, 0, 0.3);
        }

        .spacer {
            width: 150px;
        }

        /* Main Canvas Area */
        #canvas {
            position: relative;
            flex-grow: 1;
            display: flex;
        }

        /* Center Divider */
        #canvas::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background-color: #f0f0f0;
            border-radius: 2px;
        }

        /* Left Zone (Main Button) */
        #left-zone {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Stats Display for Items Owned */
        #inventory-display {
            position: absolute;
            top: 20px;
            left: 30px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 1.2rem;
            color: #888;
        }

        /* Right Zone (Upgrades) */
        #right-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
            background-color: #fafafa;
        }

        h2 {
            margin-top: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-shadow: 1px 2px 2px rgba(0,0,0,0.1);
        }

        /* Tactile Button Base Class */
        .tactile-btn {
            background: linear-gradient(145deg, #f3f3f3, #cccccc);
            border: none;
            color: #4a4a4a;
            border-radius: 12px;
            box-shadow: 0 10px 0 #9e9e9e, 5px 15px 15px rgba(0,0,0,0.15); 
            cursor: pointer;
            outline: none;
            font-family: inherit;
            transition: transform 0.06s ease-out, box-shadow 0.06s ease-out, background 0.3s, color 0.3s;
            z-index: 5; 
        }

        /* Standard active press */
        .tactile-btn:active:not(:disabled) {
            transform: translateY(10px);
            box-shadow: 0 0 0 #9e9e9e, 2px 2px 5px rgba(0,0,0,0.1);
        }
        
        .tactile-btn:focus-visible {
            outline: 3px solid #9e9e9e;
            outline-offset: 5px;
        }

        .tactile-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: translateY(10px);
            box-shadow: 0 0 0 #9e9e9e, 2px 2px 5px rgba(0,0,0,0.1);
        }

        /* THE RED BUTTON UPGRADE STATE */
        .tactile-btn.red-shiny {
            background: linear-gradient(145deg, #ff4d4d, #cc0000);
            color: #ffffff;
            box-shadow: 0 10px 0 #990000, 5px 15px 15px rgba(204,0,0,0.25);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .tactile-btn.red-shiny:active:not(:disabled) {
            box-shadow: 0 0 0 #990000, 2px 2px 5px rgba(204,0,0,0.25);
        }

        /* Specific Button Sizes */
        .main-btn {
            padding: 20px 45px;
            font-size: 3.5rem;
        }

        .upgrade-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            width: 80%;
            max-width: 400px;
        }

        .store-btn {
            flex-grow: 1;
            padding: 15px;
            font-size: 1.2rem;
            line-height: 1.4;
        }

        .icon-btn {
            padding: 0 20px;
            font-size: 1.8rem;
        }

        /* Settings Panel */
        #settings-panel {
            width: 80%;
            max-width: 400px;
            background: #eaeaea;
            padding: 20px;
            border-radius: 12px;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .hidden {
            display: none !important;
        }

        .speed-btn {
            padding: 10px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <div id="cps-display">CPS: 0</div>
        <div id="counter-wrapper">
            <span id="counter">0</span>
        </div>
        <div class="spacer"></div>
    </div>

    <div id="canvas">
        
        <div id="left-zone">
            <div id="inventory-display">
                <div id="clickers-owned-display">Auto Clickers: 0</div>
                <div id="multiplier-display">Multiplier: x1</div>
            </div>
            <button class="tactile-btn main-btn" id="main-btn">PRESS ME</button>
        </div>

        <div id="right-zone">
            <h2>UPGRADES</h2>
            
            <div class="upgrade-row">
                <button class="tactile-btn store-btn" id="buy-clicker-btn">
                    +1 Auto Clicker<br>Cost: <span id="clicker-cost">100</span>
                </button>
                <button class="tactile-btn icon-btn" id="settings-btn">⚙</button>
            </div>

            <div class="upgrade-row">
                <button class="tactile-btn store-btn" id="buy-red-btn" style="width: 100%;">
                    Red Button Upgrade (Global x2)<br>Cost: 5,000
                </button>
            </div>

            <div id="settings-panel" class="hidden">
                <h3 style="margin: 0 0 10px 0; font-size: 1.2rem; text-align: center;">UPGRADE CLICKER SPEED</h3>
                <button class="tactile-btn speed-btn" id="upg-5cps" data-cost="500" data-val="5">5 CPS (Cost: 500)</button>
                <button class="tactile-btn speed-btn" id="upg-10cps" data-cost="2000" data-val="10">10 CPS (Cost: 2,000)</button>
                <button class="tactile-btn speed-btn" id="upg-100cps" data-cost="10000" data-val="100">100 CPS (Cost: 10,000)</button>
            </div>
        </div>

    </div>

    <script>
        // Game Variables
        let clicks = 0;
        
        let autoClickers = 0;
        let clickerCost = 100;
        let clickerPower = 1; 

        let globalMultiplier = 1; // Starts at x1
        const redButtonCost = 5000;

        // DOM Elements
        const mainBtn = document.getElementById('main-btn');
        const counter = document.getElementById('counter');
        const cpsDisplay = document.getElementById('cps-display');
        const clickersOwnedDisplay = document.getElementById('clickers-owned-display');
        const clickerCostDisplay = document.getElementById('clicker-cost');
        
        const multiplierDisplay = document.getElementById('multiplier-display');
        const buyRedBtn = document.getElementById('buy-red-btn');

        const buyClickerBtn = document.getElementById('buy-clicker-btn');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsPanel = document.getElementById('settings-panel');

        // Format numbers with commas
        function formatNum(num) {
            return num.toLocaleString();
        }

        // Master UI Updater
        function updateUI() {
            counter.textContent = formatNum(Math.floor(clicks));
            
            // Calculate total CPS taking the global multiplier into account
            const totalCPS = (autoClickers * clickerPower) * globalMultiplier;
            cpsDisplay.textContent = `CPS: ${formatNum(totalCPS)}`;
            
            clickersOwnedDisplay.textContent = `Auto Clickers: ${formatNum(autoClickers)}`;
            clickerCostDisplay.textContent = formatNum(clickerCost);
            
            multiplierDisplay.textContent = `Multiplier: x${globalMultiplier}`;
        }

        // 1. Main Button Click
        mainBtn.addEventListener('click', () => {
            clicks += (1 * globalMultiplier);
            updateUI();
        });

        // 2. Buy Auto Clicker
        buyClickerBtn.addEventListener('click', () => {
            if (clicks >= clickerCost) {
                clicks -= clickerCost;
                autoClickers++;
                clickerCost = Math.ceil(clickerCost * 1.15); 
                updateUI();
            }
        });

        // 3. Buy Red Button Upgrade
        buyRedBtn.addEventListener('click', () => {
            if (clicks >= redButtonCost && globalMultiplier === 1) {
                clicks -= redButtonCost;
                globalMultiplier = 2; // Sets the global math to double
                
                // Add the CSS class to turn the button red
                mainBtn.classList.add('red-shiny');
                
                // Lock the upgrade button permanently
                buyRedBtn.disabled = true;
                buyRedBtn.innerHTML = "RED BUTTON INSTALLED";
                
                updateUI();
            }
        });

        // 4. Toggle Settings Panel
        settingsBtn.addEventListener('click', () => {
            settingsPanel.classList.toggle('hidden');
        });

        // 5. Handle Speed Upgrades
        const speedButtons = [
            document.getElementById('upg-5cps'),
            document.getElementById('upg-10cps'),
            document.getElementById('upg-100cps')
        ];

        speedButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                const cost = parseInt(this.getAttribute('data-cost'));
                const newPower = parseInt(this.getAttribute('data-val'));

                if (clicks >= cost) {
                    clicks -= cost;
                    clickerPower = newPower;
                    this.disabled = true; 
                    this.textContent = "PURCHASED";
                    updateUI();
                }
            });
        });

        // 6. The Auto-Clicker Loop (Runs once every second)
        setInterval(() => {
            if (autoClickers > 0) {
                clicks += (autoClickers * clickerPower * globalMultiplier);
                updateUI();
            }
        }, 1000);

        // Initial UI render
        updateUI();
    </script>
</body>
</html>
