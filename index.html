<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactile Button & Top Bar</title>
    <style>
        /* Base Setup */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            font-family: 'Impact', 'Arial Black', sans-serif;
            user-select: none;
        }

        /* Top Bar Styling - Now Smaller */
        #top-bar {
            width: 100%;
            height: 70px; /* Reduced from 100px */
            background-color: #f8f8f8;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10; /* Ensures it stays above the canvas */
        }

        /* Counter Wrapper acts as the physical 'floor' mask */
        #counter-wrapper {
            overflow: hidden;
            height: 55px; /* Tightly wraps the text */
            display: flex;
            align-items: flex-end; 
        }

        /* Counter styling */
        #counter {
            display: block;
            font-size: 4rem;
            line-height: 0.9; /* Keeps the text snug inside the wrapper */
            color: #4a4a4a;
            text-shadow: 2px 3px 4px rgba(0, 0, 0, 0.3);
            transform: translateY(0);
        }

        /* Main Canvas Area */
        #canvas {
            position: relative; /* Allows the divider to be placed inside */
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 10vw;
        }

        /* Center Divider - Only lives inside the canvas */
        #canvas::after {
            content: '';
            position: absolute;
            left: 50%; /* Places it exactly in the middle */
            top: 0;
            bottom: 0;
            width: 4px;
            background-color: #f0f0f0; /* Subtle grey vertical line */
            border-radius: 2px;
        }

        /* Tactile Grey Button Styling */
        #tactile-btn {
            background: linear-gradient(145deg, #f3f3f3, #cccccc);
            border: none;
            padding: 20px 45px;
            font-size: 3.5rem;
            color: #4a4a4a;
            border-radius: 12px;
            box-shadow: 
                0 10px 0 #9e9e9e, 
                5px 15px 15px rgba(0,0,0,0.15); 
            cursor: pointer;
            outline: none;
            font-family: inherit;
            /* Switched to 'ease-out' and lengthened slightly for a smoother press */
            transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
            z-index: 5; 
        }

        /* The "Pressed" State */
        #tactile-btn:active {
            transform: translateY(10px);
            box-shadow: 
                0 0 0 #9e9e9e, 
                2px 2px 5px rgba(0,0,0,0.1);
        }

        /* Rise Animation - Purely physical, no fading */
        .rise-anim {
            animation: riseUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes riseUp {
            0% { 
                transform: translateY(100%); /* Starts entirely hidden below the wrapper floor */
            }
            100% { 
                transform: translateY(0); /* Locks perfectly into place */
            }
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <div id="counter-wrapper">
            <span id="counter">0</span>
        </div>
    </div>

    <div id="canvas">
        <button id="tactile-btn">PRESS ME</button>
    </div>

    <script>
        const btn = document.getElementById('tactile-btn');
        const counter = document.getElementById('counter');
        let count = 0;

        btn.addEventListener('click', () => {
            count++;
            counter.textContent = count;

            counter.classList.remove('rise-anim');
            
            // Trigger a reflow to restart the animation smoothly
            void counter.offsetWidth; 
            
            counter.classList.add('rise-anim');
        });
    </script>
</body>
</html>
