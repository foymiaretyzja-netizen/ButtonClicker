<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactile Counter Button</title>
    <style>
        /* Setup the white canvas and align items to the left */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            background-color: #ffffff;
            padding-left: 10vw; 
            font-family: 'Impact', 'Arial Black', sans-serif;
            user-select: none; 
        }

        /* Tactile Grey Button Styling */
        #tactile-btn {
            background: linear-gradient(145deg, #f3f3f3, #cccccc);
            border: none;
            padding: 20px 45px;
            font-size: 4rem;
            color: #4a4a4a;
            border-radius: 12px;
            box-shadow: 
                0 10px 0 #9e9e9e, 
                5px 15px 15px rgba(0,0,0,0.15); 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 120px; /* Keeps the button from shrinking too much on 0 */
            outline: none;
            font-family: inherit;
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* The "Pressed" State */
        #tactile-btn:active {
            transform: translateY(10px);
            box-shadow: 
                0 0 0 #9e9e9e, 
                2px 2px 5px rgba(0,0,0,0.1);
        }

        /* Counter styling with depth */
        #counter {
            display: inline-block;
            /* Adds the requested depth to the number */
            text-shadow: 2px 3px 4px rgba(0, 0, 0, 0.3); 
            transition: text-shadow 0.1s ease;
        }

        /* Flattens the text shadow slightly when the button is pressed for realism */
        #tactile-btn:active #counter {
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        /* Animation class for the rising effect */
        .rise-anim {
            animation: riseUp 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes riseUp {
            0% { 
                transform: translateY(15px); 
                opacity: 0; 
            }
            100% { 
                transform: translateY(0); 
                opacity: 1; 
            }
        }
    </style>
</head>
<body>

    <button id="tactile-btn">
        <span id="counter">0</span>
    </button>

    <script>
        const btn = document.getElementById('tactile-btn');
        const counter = document.getElementById('counter');
        let count = 0;

        btn.addEventListener('click', () => {
            count++;
            counter.textContent = count;

            counter.classList.remove('rise-anim');
            
            // Trigger a reflow to restart the animation smoothly
            void counter.offsetWidth; 
            
            counter.classList.add('rise-anim');
        });
    </script>
</body>
</html>
